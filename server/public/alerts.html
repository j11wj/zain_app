<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Waste — Alerts</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Smart Waste Admin</a>
      </div>
    </nav>
    <div class="container-fluid">
      <div class="row">
        <aside class="col-md-2 py-4 sidebar">
          <nav class="nav flex-column px-2">
            <a class="nav-link" href="/">Overview</a>
            <a class="nav-link" href="/bins.html">Bins status</a>
            <a class="nav-link active" href="/alerts.html">Alerts</a>
            <a class="nav-link" href="/reports.html">Reports</a>
            <a class="nav-link" href="/clusters.html">Clusters</a>
          </nav>
        </aside>
        <main class="col-md-10 py-4 px-4">
          <h1 class="h3 mb-4">Alerts</h1>
          <p class="text-muted small">
            Rules: fill &gt; 80%, gas above threshold, fire detected. WebSocket pushes
            simulation ticks for near real-time refresh.
          </p>
          <div class="card stat-card">
            <div class="card-body">
              <table class="table">
                <thead>
                  <tr>
                    <th>Type</th>
                    <th>Bin</th>
                    <th>Message</th>
                    <th>Time</th>
                  </tr>
                </thead>
                <tbody id="tbody">
                  <tr>
                    <td colspan="4" class="text-muted">Loading…</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="/js/common.js"></script>
    <script>
      async function load() {
        const { alerts } = await fetchJson("/api/alerts?limit=200");
        const tb = document.getElementById("tbody");
        if (!alerts.length) {
          tb.innerHTML =
            '<tr><td colspan="4" class="text-muted">No alerts yet.</td></tr>';
          return;
        }
        tb.innerHTML = alerts
          .map(
            (a) => `<tr>
          <td><span class="badge bg-dark">${a.type}</span></td>
          <td>${a.bin_id ?? "—"}</td>
          <td>${a.message}</td>
          <td class="small text-muted">${a.timestamp}</td>
        </tr>`
          )
          .join("");
      }
      load();
      connectAlertsFeed(() => load());
      setInterval(load, 10000);
    </script>
  </body>
</html>
