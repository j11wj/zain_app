<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Waste — Bins</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Smart Waste Admin</a>
      </div>
    </nav>
    <div class="container-fluid">
      <div class="row">
        <aside class="col-md-2 py-4 sidebar">
          <nav class="nav flex-column px-2">
            <a class="nav-link" href="/">Overview</a>
            <a class="nav-link active" href="/bins.html">Bins status</a>
            <a class="nav-link" href="/alerts.html">Alerts</a>
            <a class="nav-link" href="/reports.html">Reports</a>
            <a class="nav-link" href="/clusters.html">Clusters</a>
          </nav>
        </aside>
        <main class="col-md-10 py-4 px-4">
          <h1 class="h3 mb-4">Bins status</h1>
          <div class="row g-3 mb-4" id="cards"></div>
          <div class="card stat-card">
            <div class="card-body">
              <h2 class="h5">All bins</h2>
              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Lat</th>
                      <th>Lng</th>
                      <th>Fill %</th>
                      <th>Gas</th>
                      <th>Fire</th>
                    </tr>
                  </thead>
                  <tbody id="tbody"></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="card stat-card mt-3">
            <div class="card-body">
              <h2 class="h5">Map</h2>
              <div id="map"></div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/common.js"></script>
    <script>
      const map = L.map("map").setView([40.758, -73.985], 13);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap",
      }).addTo(map);
      let markers = [];

      async function load() {
        const { bins } = await fetchJson("/api/bins");
        document.getElementById("cards").innerHTML = bins
          .map(
            (b) => `
          <div class="col-md-4">
            <div class="card stat-card h-100">
              <div class="card-body">
                <div class="d-flex justify-content-between">
                  <span class="fw-semibold">Bin ${b.id}</span>
                  <span class="${statusClass(b.fill_level)} fw-bold">${b.fill_level}%</span>
                </div>
                <div class="small text-muted mt-2">Gas ${b.gas_level.toFixed(1)} · ${
              b.fire_status ? '<span class="badge badge-fire">FIRE</span>' : "OK"
            }</div>
              </div>
            </div>
          </div>`
          )
          .join("");
        document.getElementById("tbody").innerHTML = bins
          .map(
            (b) => `<tr>
          <td>${b.id}</td>
          <td>${b.lat.toFixed(5)}</td>
          <td>${b.lng.toFixed(5)}</td>
          <td class="${statusClass(b.fill_level)}">${b.fill_level}</td>
          <td>${b.gas_level}</td>
          <td>${b.fire_status ? "Yes" : "No"}</td>
        </tr>`
          )
          .join("");
        markers.forEach((m) => map.removeLayer(m));
        markers = [];
        bins.forEach((b) => {
          const col =
            b.fill_level < 50 ? "#2d6a4f" : b.fill_level <= 80 ? "#e9c46a" : "#c1121f";
          const m = L.circleMarker([b.lat, b.lng], {
            radius: 9,
            color: col,
            fillColor: col,
            fillOpacity: 0.9,
          }).addTo(map);
          m.bindPopup(`Bin ${b.id} — ${b.fill_level}%`);
          markers.push(m);
        });
        if (markers.length) {
          map.fitBounds(L.featureGroup(markers).getBounds().pad(0.12));
        }
      }
      load();
      connectAlertsFeed(() => load());
      setInterval(load, 8000);
    </script>
  </body>
</html>
