<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Waste — Reports</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Smart Waste Admin</a>
      </div>
    </nav>
    <div class="container-fluid">
      <div class="row">
        <aside class="col-md-2 py-4 sidebar">
          <nav class="nav flex-column px-2">
            <a class="nav-link" href="/">Overview</a>
            <a class="nav-link" href="/bins.html">Bins status</a>
            <a class="nav-link" href="/alerts.html">Alerts</a>
            <a class="nav-link active" href="/reports.html">Reports</a>
            <a class="nav-link" href="/clusters.html">Clusters</a>
          </nav>
        </aside>
        <main class="col-md-10 py-4 px-4">
          <h1 class="h3 mb-4">Monthly statistics</h1>
          <p class="text-muted small">
            Average fill level per month from stored history (simulation data).
          </p>
          <div class="card stat-card mb-4">
            <div class="card-body">
              <canvas id="chart" height="100"></canvas>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <script src="/js/common.js"></script>
    <script>
      let chart;
      async function load() {
        const data = await fetchJson("/api/stats/monthly");
        const months = data.months.map((m) => m.month);
        const avgs = data.months.map((m) => m.avg_fill);
        const ctx = document.getElementById("chart");
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: months,
            datasets: [
              {
                label: "Avg fill %",
                data: avgs,
                borderColor: "#2d6a4f",
                backgroundColor: "rgba(45,106,79,0.1)",
                fill: true,
                tension: 0.25,
              },
            ],
          },
          options: {
            responsive: true,
            scales: { y: { beginAtZero: true, max: 100 } },
          },
        });
      }
      load();
      connectAlertsFeed(() => load());
      setInterval(load, 15000);
    </script>
  </body>
</html>
